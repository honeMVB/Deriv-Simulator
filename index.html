<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trading Simulator</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      font-family: sans-serif;
      overflow: hidden;
    }
    #controls {
      position: absolute;
      top: 10px; left: 10px;
      z-index: 50;
      background: rgba(255,255,255,0.95);
      padding: 10px;
      border-radius: 5px;
    }
    #controls button, #controls input, #controls select, #controls label {
      margin: 5px;
      font-size: 14px;
    }
    #chart {
      width: 100%; height: 100%;
    }
    /* Log panel in top-right */
    #logPanel {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 300px;
      max-height: 300px;
      overflow-y: auto;
      background: rgba(0,0,0,0.8);
      color: #fff;
      font-size: 12px;
      padding: 5px;
      z-index: 60;
      border-radius: 5px;
      transition: transform 0.3s, opacity 0.3s;
    }
    /* Collapsed state */
    #logPanel.collapsed {
      transform: translateX(105%);
      opacity: 0;
    }
    /* Drawing layer over chart */
    #drawingLayer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 40;
    }
    #drawingLayer.active {
      pointer-events: auto;
      cursor: crosshair;
    }
  </style>
  <!-- Load Lightweight Charts v5.0.3 standalone build -->
  <script src="https://unpkg.com/lightweight-charts@5.0.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div id="controls">
    <label for="symbolSelect">Symbol:</label>
    <select id="symbolSelect"></select>
    <label for="timeframeSelect">Timeframe:</label>
    <select id="timeframeSelect">
      <option value="60">1 Minute</option>
      <option value="300">5 Minutes</option>
      <option value="900">15 Minutes</option>
      <option value="3600">1 Hour</option>
      <option value="86400">1 Day</option>
    </select>
    <br>
    <button id="loadDataBtn">Load Data</button>
    <button id="replayBtn">Start Replay</button>
    <button id="pauseReplayBtn">Pause Replay</button>
    <label>Replay Speed (ms):</label>
    <input type="range" id="replaySpeed" min="100" max="2000" value="500">
    <span id="speedDisplay">500</span>
    <br>
    <label for="scrubSlider">Scrub:</label>
    <input type="range" id="scrubSlider" min="0" max="100" value="100">
    <br>
    <button id="toggleLiveBtn">Enable Live Updates</button>
    <br>
    <button id="drawTrendlineBtn">Draw Trendline</button>
    <button id="drawFibBtn">Draw Fibonacci</button>
    <button id="clearDrawingsBtn">Clear Drawings</button>
    <br>
    <button id="toggleLogBtn">Toggle Log</button>
  </div>
  <div id="chart"></div>
  <svg id="drawingLayer"></svg>
  <div id="logPanel"></div>
  
  <!-- Load modules in proper order -->
  <script src="js/config.js"></script>
  <script src="js/uiManager.js"></script>
  <script src="js/dataManager.js"></script>
  <script src="js/chartManager.js"></script>
  <script src="js/replayManager.js"></script>
  <script src="js/liveManager.js"></script>
  <script src="js/drawingTools.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
